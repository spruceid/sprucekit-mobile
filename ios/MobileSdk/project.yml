name: MobileSdk
options:
  bundleIdPrefix: com.spruceid.mobile.sdk
packages:
  SpruceIDMobileSdk:
    path: "../../"
  SwiftAlgorithms:
    url: https://github.com/apple/swift-algorithms
    from: 1.2.0
  SwiftLint:
    url: https://github.com/realm/SwiftLint
    # Pinned: tag 0.63.3 exists without a published GitHub Release, so SPM
    # resolves to it and then 404s on SwiftLintBinary.artifactbundle.zip.
    # Track upstream fix: https://github.com/realm/SwiftLint/issues/6669
    exactVersion: 0.63.2
settings:
  ENABLE_USER_SCRIPT_SANDBOXING: YES
  GENERATE_INFOPLIST_FILE: YES
  DEVELOPMENT_TEAM: FZVYR3KYL4
targets:
  MobileSdk:
    type: library.dynamic
    platform: iOS
    deploymentTarget: "14.0"
    sources:
      - Sources
    dependencies:
      - package: SpruceIDMobileSdk
        product: SpruceIDMobileSdkRs
      - package: SwiftAlgorithms
        product: Algorithms
    scheme:
      testTargets:
        - MobileSdkTests
    info:
      path: Info.plist
      properties:
        NSBluetoothAlwaysUsageDescription: "Secure transmission of mobile DL data"
        NSCameraUsageDescription: "QR Code Scanner"
    buildToolPlugins:
      - plugin: SwiftLintPlugin
        package: SwiftLint
  MobileSdkTests:
    platform: iOS
    type: bundle.unit-test
    sources:
      - Tests
    dependencies:
      - target: MobileSdk
